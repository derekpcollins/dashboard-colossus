<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colossus Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 200px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      padding: 20px;
    }
    .sidebar h3 {
      font-size: 16px;
      margin-bottom: 20px;
    }
    .nav-item {
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      transition: background 0.2s;
    }
    .nav-item:hover {
      background: #333;
    }
    .nav-item.active {
      background: #0066cc;
      color: white;
    }
    .main {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th {
      background: #1a1a1a;
      font-weight: 600;
    }
    tr:hover { background: #1a1a1a; }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.active { background: #0066cc; color: white; }
    .badge.inactive { background: #555; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h3>Colossus</h3>
      <div class="nav-item active" onclick="showTab('cron-jobs', event)">Cron Jobs</div>
    </div>
    <div class="main">
      <h1>Dashboard</h1>

      <div id="cron-jobs" class="tab-content active">
        <h2>Cron Jobs</h2>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Schedule</th>
              <th>Task</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="cron-table">
            <tr>
              <td>06:00</td>
              <td>Daily</td>
              <td>Morning Brief</td>
              <td><span class="badge active">Active</span></td>
            </tr>
            <tr>
              <td>21:00</td>
              <td>Daily</td>
              <td>Evening Brief</td>
              <td><span class="badge active">Active</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function showTab(tabId, event) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
