<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colossus Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 200px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      padding: 20px;
    }
    .sidebar h3 {
      font-size: 16px;
      margin-bottom: 20px;
    }
    .nav-item {
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      transition: background 0.2s;
    }
    .nav-item:hover {
      background: #333;
    }
    .nav-item.active {
      background: #0066cc;
      color: white;
    }
    .main {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th {
      background: #1a1a1a;
      font-weight: 600;
    }
    tr:hover { background: #1a1a1a; }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.active { background: #0066cc; color: white; }
    .badge.inactive { background: #555; color: #999; }
    .stat-card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
      margin: 10px 0;
      border-left: 3px solid #0066cc;
    }
    .stat-card h3 {
      font-size: 14px;
      color: #999;
      margin-bottom: 5px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
    }
    .loading {
      color: #999;
      font-style: italic;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #333;
        padding: 15px;
        display: flex;
        flex-direction: column;
      }
      .sidebar > div:first-child {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .sidebar h3 {
        margin-bottom: 0;
      }
      #menu-toggle {
        display: block !important;
      }
      #nav-items {
        display: none;
        flex-direction: column;
        gap: 5px;
      }
      #nav-items.open {
        display: flex;
      }
      .nav-item {
        display: block;
        padding: 10px;
        margin: 0;
      }
      .main {
        padding: 20px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
      }
      h2 {
        font-size: 18px;
      }
      table {
        font-size: 13px;
      }
      th, td {
        padding: 8px;
      }
      .stat-card {
        padding: 15px;
      }
      .stat-card .value {
        font-size: 20px;
      }
    }

    @media (max-width: 480px) {
      .sidebar {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-item {
        display: block;
        margin: 5px 0;
        padding: 10px;
        width: 100%;
      }
      h1 {
        font-size: 20px;
      }
      table {
        font-size: 12px;
      }
      th, td {
        padding: 6px;
      }
      .stat-card {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar" id="sidebar">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h3>Colossus</h3>
        <button id="menu-toggle" style="display: none; background: none; border: none; color: #e0e0e0; font-size: 24px; cursor: pointer; padding: 5px;">☰</button>
      </div>
      <div id="nav-items">
        <div class="nav-item active" onclick="showTab('cron-jobs', event)">Cron Jobs</div>
        <div class="nav-item" onclick="showTab('token-usage', event)">Token Usage</div>
        <div class="nav-item" onclick="showTab('system-health', event)">System Health</div>
        <div class="nav-item" onclick="showTab('projects', event)">Projects</div>
      </div>
    </div>
    <div class="main">
      <h1>Dashboard</h1>

      <div id="cron-jobs" class="tab-content active">
        <h2>Cron Jobs</h2>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Schedule</th>
              <th>Task</th>
              <th>Status</th>
              <th>Last Run</th>
            </tr>
          </thead>
          <tbody id="cron-table">
          </tbody>
        </table>
      </div>

      <div id="token-usage" class="tab-content">
        <h2>Token Usage</h2>
        <div id="token-summary" class="loading">Loading...</div>
        <table>
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Model</th>
              <th>Input</th>
              <th>Output</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="token-table">
          </tbody>
        </table>
      </div>

      <div id="system-health" class="tab-content">
        <h2>System Health</h2>
        <div id="health-cards" class="loading">Loading...</div>
        <div style="margin-top: 20px;" id="health-details"></div>
      </div>

      <div id="projects" class="tab-content">
        <h2>Active Projects</h2>
        <table>
          <thead>
            <tr>
              <th>Project</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Category</th>
            </tr>
          </thead>
          <tbody id="projects-table">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function showTab(tabId, event) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      if (event) event.target.classList.add('active');

      if (tabId === 'cron-jobs') {
        loadCronData();
      } else if (tabId === 'token-usage') {
        loadTokenData();
      } else if (tabId === 'system-health') {
        loadSystemHealth();
      } else if (tabId === 'projects') {
        loadProjects();
      }
    }

    async function loadSystemHealth() {
      try {
        const response = await fetch('/data/system-health.json');
        if (!response.ok) throw new Error('No health data');
        const health = await response.json();

        let cards = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">';
        cards += `
          <div class="stat-card">
            <h3>Uptime</h3>
            <div class="value" style="font-size: 14px; word-break: break-word;">${health.uptime}</div>
          </div>
          <div class="stat-card">
            <h3>Disk</h3>
            <div class="value">${health.disk.percent}</div>
            <div style="font-size: 12px; color: #666;">${health.disk.used} / ${health.disk.total}</div>
          </div>
          <div class="stat-card">
            <h3>Network</h3>
            <div class="value" style="font-size: 16px;">${health.network}</div>
          </div>
          <div class="stat-card">
            <h3>Status</h3>
            <div class="value" style="font-size: 18px; color: #0066cc;">${health.status}</div>
          </div>
        `;
        cards += '</div>';
        document.getElementById('health-cards').innerHTML = cards;

        document.getElementById('health-details').innerHTML = `<p style="font-size: 12px; color: #666;">Last synced: ${new Date(health.timestamp).toLocaleString()}</p>`;
      } catch (err) {
        document.getElementById('health-cards').innerHTML = '<p style="color: #666;">No health data available</p>';
      }
    }

    async function loadProjects() {
      try {
        const response = await fetch('/data/projects.json');
        if (!response.ok) throw new Error('No projects data');
        const data = await response.json();

        const tbody = document.getElementById('projects-table');
        tbody.innerHTML = '';
        (data.projects || []).forEach(project => {
          const row = tbody.insertRow();
          const statusBadge = project.status === 'active' ? 'active' : 'inactive';
          row.innerHTML = `
            <td><strong>${project.name}</strong></td>
            <td><span class="badge ${statusBadge}">${project.status}</span></td>
            <td>${project.priority}</td>
            <td>${project.category}</td>
          `;
        });

        if (data.projects.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #666;">No active projects</td></tr>';
        }
      } catch (err) {
        document.getElementById('projects-table').innerHTML = '<tr><td colspan="4" style="text-align: center; color: #666;">Unable to load projects</td></tr>';
      }
    }

    // Mobile menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    const navItems = document.getElementById('nav-items');
    
    menuToggle.addEventListener('click', () => {
      navItems.classList.toggle('open');
    });

    // Close menu when nav item clicked
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          navItems.classList.remove('open');
        }
      });
    });

    // Load data on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadCronData();
    });

    async function loadCronData() {
      try {
        const response = await fetch('/data/crons.json');
        if (!response.ok) throw new Error('No cron data');
        const data = await response.json();
        
        const tbody = document.getElementById('cron-table');
        tbody.innerHTML = '';
        (data.crons || []).forEach(cron => {
          const lastRunText = cron.lastRun 
            ? new Date(cron.lastRun).toLocaleString()
            : '—';
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${cron.time}</td>
            <td>${cron.schedule}</td>
            <td>${cron.task}</td>
            <td><span class="badge active">Active</span></td>
            <td>${lastRunText}</td>
          `;
        });
      } catch (err) {
        console.error('Failed to load cron data:', err);
      }
    }

    async function loadTokenData() {
      try {
        const response = await fetch('/data/tokens.json');
        if (!response.ok) throw new Error('No token data');
        const data = await response.json();

        // Summary stats
        let summary = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">';
        Object.entries(data.summary || {}).forEach(([model, stats]) => {
          summary += `
            <div class="stat-card">
              <h3>${model}</h3>
              <div class="value">${stats.total.toLocaleString()}</div>
              <div style="font-size: 12px; color: #666;">tokens (${stats.sessions} sessions)</div>
            </div>
          `;
        });
        summary += '</div>';
        document.getElementById('token-summary').innerHTML = summary;

        // Sessions table
        const tbody = document.getElementById('token-table');
        tbody.innerHTML = '';
        (data.sessions || []).reverse().forEach(session => {
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${new Date(session.timestamp).toLocaleString()}</td>
            <td>${session.model}</td>
            <td>${session.inputTokens.toLocaleString()}</td>
            <td>${session.outputTokens.toLocaleString()}</td>
            <td><strong>${session.totalTokens.toLocaleString()}</strong></td>
          `;
        });
      } catch (err) {
        document.getElementById('token-summary').innerHTML = '<p style="color: #666;">No token data yet</p>';
      }
    }
  </script>
</body>
</html>
